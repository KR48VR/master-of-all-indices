name: Data integrity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Honesty rules are enforced, not promised
        run: node scripts/check-integrity.js
      - name: dataset.csv is in sync with dataset.js
        run: node scripts/build-csv.js --check
